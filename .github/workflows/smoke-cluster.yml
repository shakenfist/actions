# Reusable smoke-cluster CI workflow.
#
# Deploys a single-node Shaken Fist smoke cluster via the
# shakenfist.shakenfist ansible collection (examples/_shared/site.yml) instead
# of getsf, runs the smoke functional test suite, and gathers logs. Callers
# (shakenfist's own functional-tests.yml now, the downstream repos in phase 8)
# invoke it with a few-line `uses:`.
#
#   jobs:
#     smoke:
#       uses: shakenfist/actions/.github/workflows/smoke-cluster.yml@main
#       secrets: inherit
#       with:
#         component: shakenfist
#         component_ref: ${{ github.sha }}
#         tier: smoke
#
# Component selection: setup-test-environment checks out shakenfist,
# client-python and agent-python; the checkout of the repository that
# TRIGGERED the workflow is at the triggering ref (for a pull request,
# the PR merge ref) and the others are at their default branches, and
# the collection deploy builds the server and client wheels from those
# checkouts. So a client-python PR is deployed
# into the cluster against a develop server, and vice versa. The
# component / component_ref inputs are used for logging and concurrency
# grouping, not checkout control; cross-repo changes land in dependency
# order.
#
# The deploy itself lives in the build-smoke-cluster composite action,
# which repositories with their own test content can use directly to get
# a live cluster inside their own job.

name: Smoke cluster

on:
  workflow_call:
    inputs:
      component:
        type: string
        required: true
      component_ref:
        type: string
        required: true
      tier:
        type: string
        default: smoke
      topology:
        # Selects which ansible/ci-topology-<topology>.yml provisions the
        # under-cloud VMs: localhost (single-node smoke), slim-primary or
        # slim-tier (multi-node). tier still selects the test-suite depth.
        type: string
        default: localhost
      base_image:
        type: string
        default: 'sf://label/ci-images/debian-12'
      base_image_user:
        type: string
        default: debian
      stestr_config:
        type: string
        default: smoke-ci.conf
      test_kind:
        # Which test suite to run after the deploy. 'functional' (default) runs
        # the stestr suite named by stestr_config. 'ansible-modules' instead
        # provisions ansible-core plus the freshly built shakenfist.shakenfist
        # collection on the primary and runs the native-module lifecycle suite
        # (ansiblemoduletests.sh). stestr_config is ignored when this is
        # 'ansible-modules'.
        type: string
        default: functional
      test_concurrency:
        type: number
        default: 3
      test_timeout_minutes:
        # Wall-clock budget for the functional test step. Topologies with
        # fewer hypervisor nodes (slim-tier runs the same cluster suite on
        # roughly half slim-primary's compute) need more headroom under
        # under-cloud contention -- the suite passes, it just runs slower.
        type: number
        default: 45
      concurrency_key:
        # Disambiguates the concurrency group when one caller invokes this
        # workflow several times on the same ref (e.g. a matrix of topologies).
        # Without it every matrix entry shares component+tier+ref and they
        # cancel each other. Callers pass a per-entry slug (their job_name).
        # The slug is also embedded in the bundle artifact name, which
        # forbids characters like / \ : " -- keep it to alphanumerics and
        # dashes.
        type: string
        default: ''

jobs:
  smoke_cluster:
    name: "Smoke tests (collection)"
    runs-on: [self-hosted, vm, debian-12]
    # NOTE: inside a reusable workflow `github.workflow` resolves to the
    # CALLER's workflow name, so it cannot disambiguate this job from the
    # caller's own jobs. Use a literal prefix plus the component so this never
    # shares a group with the caller's getsf smoke job (which is
    # "<caller workflow>-<ref>-smoke") and so different components calling this
    # workflow on the same ref do not cancel each other.
    concurrency:
      group: smoke-cluster-${{ inputs.component }}-${{ inputs.tier }}-${{ inputs.concurrency_key }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Log input details
        run: |
          echo "component: ${{ inputs.component }}"
          echo "component_ref: ${{ inputs.component_ref }}"
          echo "tier: ${{ inputs.tier }}"
          echo "topology: ${{ inputs.topology }}"
          echo "base_image: ${{ inputs.base_image }}"
          echo "base_image_user: ${{ inputs.base_image_user }}"
          echo "stestr_config: ${{ inputs.stestr_config }}"

      - name: Setup test environment
        uses: shakenfist/actions/setup-test-environment@main

      - name: Build the smoke cluster
        id: cluster
        timeout-minutes: 90
        uses: shakenfist/actions/build-smoke-cluster@main
        with:
          topology: ${{ inputs.topology }}
          base_image: ${{ inputs.base_image }}
          base_image_user: ${{ inputs.base_image_user }}

      # Additional images used only by guest CI. The base test image import
      # is part of the build-smoke-cluster action; these extras are a detail
      # of the guest stestr suite, so they live here with it.
      - name: Import guest CI images
        if: inputs.stestr_config == 'guest-ci.conf'
        run: |
          set -e
          . ${GITHUB_WORKSPACE}/ci-environment.sh

          setup="export PATH=$PATH:/srv/shakenfist/venv/bin;"
          setup="${setup} . /etc/sf/sfrc;"
          setup="${setup} export SHAKENFIST_API_URL=http://localhost:13000;"
          setup="${setup} /srv/shakenfist/venv/bin/sf-client artifact upload"
          ssh -i /srv/github/id_ci -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              ${{ inputs.base_image_user }}@${UPLOAD_TARGET} \
              "${setup} ubuntu-2004 /srv/ci/ubuntu:20.04 --shared --no-checksum"
          ssh -i /srv/github/id_ci -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              ${{ inputs.base_image_user }}@${UPLOAD_TARGET} \
              "${setup} cirros /srv/ci/cirros --shared"

      - name: Make the traces directory
        if: inputs.test_kind == 'functional'
        run: |
          . ${GITHUB_WORKSPACE}/ci-environment.sh
          ssh -i /srv/github/id_ci -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              ${{ inputs.base_image_user }}@${primary} "sudo mkdir -p /srv/ci/traces; sudo chown -R ${{ inputs.base_image_user }}:${{ inputs.base_image_user }} /srv/ci/traces"

      # The functional suite runs on the primary, but some assertions must
      # inspect real host state (net namespaces, links, iptables) on *other*
      # cluster nodes -- e.g. the network node for floating IPs. Drop the CI
      # key onto the primary so those helpers can ssh across the mesh; every
      # node already trusts id_ci for this user. See the shakenfist repo's
      # docs/plans/PLAN-ci-node-exec-assertions.md.
      - name: Authorise the primary to reach other nodes over the mesh
        if: inputs.test_kind == 'functional'
        run: |
          . ${GITHUB_WORKSPACE}/ci-environment.sh
          ssh -i /srv/github/id_ci -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              ${{ inputs.base_image_user }}@${primary} "mkdir -p ~/.ssh"
          scp -i /srv/github/id_ci -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              /srv/github/id_ci \
              ${{ inputs.base_image_user }}@${primary}:.ssh/id_rsa
          ssh -i /srv/github/id_ci -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              ${{ inputs.base_image_user }}@${primary} "chmod 600 ~/.ssh/id_rsa"

      - name: Run functional tests
        if: inputs.test_kind == 'functional'
        timeout-minutes: ${{ inputs.test_timeout_minutes }}
        run: |
          set -e
          . ${GITHUB_WORKSPACE}/ci-environment.sh
          scp -rp -i /srv/github/id_ci -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              ${GITHUB_WORKSPACE}/shakenfist \
              ${{ inputs.base_image_user }}@${primary}:shakenfist
          scp -rp -i /srv/github/id_ci -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              ${GITHUB_WORKSPACE}/client-python \
              ${{ inputs.base_image_user }}@${primary}:client-python

          script="cd shakenfist/;"
          script="${script} . /etc/sf/sfrc;"

          script="${script} python3 -mvenv /tmp/functests;"
          script="${script} . /tmp/functests/bin/activate;"
          script="${script} pip3 install -U uv;"
          script="${script} uv pip install -U -r pyproject.toml --all-extras;"
          script="${script} echo -e '\n\nvenv pip after packages:\n';"
          script="${script} pip3 list;"
          script="${script} echo -e '\n---\n';"

          script="${script} echo -e '\n\nInstall client-python:\n';"
          script="${script} cd ~/client-python;"
          script="${script} pip3 install .;"

          script="${script} cd ~/shakenfist/shakenfist/deploy/;"
          script="${script} set -e;"
          script="${script} stestr run --config ${{ inputs.stestr_config }} --concurrency=${{ inputs.test_concurrency }};"

          ssh -i /srv/github/id_ci -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              ${{ inputs.base_image_user }}@${primary} "${script}"

      - name: Run ansible module tests
        if: inputs.test_kind == 'ansible-modules'
        timeout-minutes: 60
        run: |
          set -e
          . ${GITHUB_WORKSPACE}/ci-environment.sh

          # Ship the repo (the scenario playbooks live in
          # shakenfist/deploy/ansible_module_ci), the client (the sf_* modules
          # import shakenfist_client), and the collection tarball the deploy
          # built into shakenfist/dist-collection.
          scp -rp -i /srv/github/id_ci -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              ${GITHUB_WORKSPACE}/shakenfist \
              ${{ inputs.base_image_user }}@${primary}:shakenfist
          scp -rp -i /srv/github/id_ci -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              ${GITHUB_WORKSPACE}/client-python \
              ${{ inputs.base_image_user }}@${primary}:client-python

          # The collection deploy installs only the SF server on the node, not
          # ansible. Build a venv on the primary carrying ansible-core, the
          # client, and the shakenfist.shakenfist collection. The sf_* modules
          # run under the venv interpreter (ANSIBLE_PYTHON_INTERPRETER) so they
          # import the client from there; without the override ansible would use
          # the system interpreter, which lacks shakenfist_client. sfrc supplies
          # the API URL and credentials the modules read from the environment.
          script="set -e;"
          script="${script} python3 -mvenv /tmp/moduletests;"
          script="${script} . /tmp/moduletests/bin/activate;"
          script="${script} pip3 install -U uv;"
          script="${script} uv pip install ansible-core;"
          script="${script} pip3 install ~/client-python;"
          script="${script} ansible-galaxy collection install ~/shakenfist/dist-collection/*.tar.gz --force;"
          script="${script} . /etc/sf/sfrc;"
          script="${script} export ANSIBLE_PYTHON_INTERPRETER=/tmp/moduletests/bin/python3;"
          script="${script} cd ~/shakenfist/shakenfist/deploy;"
          script="${script} bash ansiblemoduletests.sh;"

          ssh -i /srv/github/id_ci -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              ${{ inputs.base_image_user }}@${primary} "${script}"

      - name: List slowest tests
        if: inputs.test_kind == 'functional'
        run: |
          . ${GITHUB_WORKSPACE}/ci-environment.sh

          script=". /tmp/functests/bin/activate;"
          script="${script} cd shakenfist/shakenfist/deploy;"
          script="${script} stestr slowest --config ${{ inputs.stestr_config }} || true;"

          ssh -i /srv/github/id_ci -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              ${{ inputs.base_image_user }}@${primary} "${script}"

      - name: List failing tests
        if: failure() && inputs.test_kind == 'functional'
        id: failures
        run: |
          . ${GITHUB_WORKSPACE}/ci-environment.sh

          echo "Gathering list of failed tests..."
          touch /srv/ci/failed
          script=". /tmp/functests/bin/activate;"
          script="${script} cd shakenfist/shakenfist/deploy;"
          script="${script} stestr failing --config ${{ inputs.stestr_config }} || true;"

          ssh -i /srv/github/id_ci -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              ${{ inputs.base_image_user }}@${primary} "${script}" > /srv/ci/failed
          echo

          failed=$(cat /srv/ci/failed | egrep "^FAIL: " | \
              sed -z 's/FAIL: shakenfist_ci\.//g;s/\n/, /g;s/, $/\n/')

          echo "Failed tests:"
          cat /srv/ci/failed
          echo

          echo "failures<<EOF" >> ${GITHUB_OUTPUT}
          echo "${failed}" >> ${GITHUB_OUTPUT}
          echo "EOF" >> ${GITHUB_OUTPUT}
          echo "GITHUB_OUTPUT is:"
          cat ${GITHUB_OUTPUT}

      - name: Check for exceptions on disk
        id: check_exceptions
        if: always()
        run: |
          . ${GITHUB_WORKSPACE}/ci-environment.sh

          # SF writes exception JSON to /srv/shakenfist/exceptions on the node
          # where the exception fired. The smoke cluster is a single node, so
          # check the primary directly over ssh. (The collection deploy runs
          # ansible from the runner and does not install ansible on the node,
          # unlike the old getsf path, so we cannot fan out with ansible here.)
          ssh -i /srv/github/id_ci -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              ${{ inputs.base_image_user }}@${primary} \
              'sudo mkdir -p /srv/shakenfist/exceptions; sudo find /srv/shakenfist/exceptions -type f -ls' || true
          echo

          EXCEPTION_COUNT=$(ssh -i /srv/github/id_ci -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              ${{ inputs.base_image_user }}@${primary} \
              'sudo find /srv/shakenfist/exceptions -type f 2>/dev/null | wc -l')
          echo "Exception files found: ${EXCEPTION_COUNT}"
          if [ "${EXCEPTION_COUNT}" -gt 0 ]; then
            echo "exceptions_found=true" >> $GITHUB_OUTPUT
          else
            echo "exceptions_found=false" >> $GITHUB_OUTPUT
          fi

      # Prove the sf-api SIGTERM drain works on a live node: /readyz flips to
      # 503 while the worker is still serving, then sf-api exits cleanly and is
      # restarted. Run this BEFORE "Check logs" so the stop/restart has fully
      # settled and the node is back in rotation before the log-failure greps
      # run. A clean drain exits 143 (SuccessExitStatus=SIGTERM), so it does not
      # produce the "Main process exited"/"stop-sigterm timed out"/"Failed with
      # result" lines those greps reject. This is an assertion, not a
      # diagnostic, so no "|| true" -- a broken drain fails the job.
      - name: Check sf-api drain
        id: check_drain
        if: always()
        run: |
          . ${GITHUB_WORKSPACE}/ci-environment.sh
          cd ${GITHUB_WORKSPACE}/actions
          tools/run_remote ${primary} "sudo bash tools/ci_drain_check.sh"

      - name: Check logs
        id: check_logs
        if: always()
        run: |
          . ${GITHUB_WORKSPACE}/ci-environment.sh
          cd ${GITHUB_WORKSPACE}/actions
          tools/run_remote ${primary} "sudo bash tools/ci_log_checks_loki.sh develop smoke"

      - name: Dump systemd state and journals
        if: always() && steps.check_logs.outcome == 'failure'
        run: |
          . ${GITHUB_WORKSPACE}/ci-environment.sh
          cd ${GITHUB_WORKSPACE}/actions
          tools/run_remote ${primary} 'echo "=== systemctl --failed (primary) ==="; sudo systemctl --failed --no-pager; echo "=== journalctl sf-* (primary, last 200 warn+) ==="; sudo journalctl -u "sf-*.service" -p warning -n 200 --no-pager' || true

      - name: Set check_logs output for matrix aggregation
        id: set_output
        if: always()
        run: |
          echo "smoke=${{ steps.check_logs.outcome == 'failure' }}" >> $GITHUB_OUTPUT

      - name: Set exceptions output for matrix aggregation
        id: set_exceptions_output
        if: always()
        run: |
          echo "smoke=${{ steps.check_exceptions.outputs.exceptions_found }}" >> $GITHUB_OUTPUT

      # On Ubuntu 22.04 the cleaner is rated a CPU hog because of etcd cleanup
      # cost. That's not really something we can control, so just ignore the CPU
      # usage of that process instead.
      - name: Check SF process CPU usage
        if: always()
        run: |
          . ${GITHUB_WORKSPACE}/ci-environment.sh
          ssh -i /srv/github/id_ci -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              ${{ inputs.base_image_user }}@${primary} '. /etc/sf/sfrc; /srv/shakenfist/venv/bin/sf-client node cpuhogs -t 1.75 --ignore sf_cleaner,loki'

      # Gating per-node system check. Loki only carries SF's application
      # logs, so kernel/systemd-level failures (apparmor denials, segfaults,
      # abseil/gRPC C++ fatals, systemd unit exits) live only in each node's
      # journald. This fans out across the inventory and fails the run on any
      # node's system-level failure -- coverage Loki cannot provide.
      - name: Per-node system-level checks
        if: always()
        run: |
          . ${GITHUB_WORKSPACE}/ci-environment.sh
          cp /srv/github/id_ci /home/debian/.ssh/id_rsa
          cp /srv/github/id_ci.pub /home/debian/.ssh/id_rsa.pub
          ansible-playbook -i /srv/github/ci-inventory.yaml \
              --extra-vars "base_image_user=${{ inputs.base_image_user }} \
              ansible_ssh_common_args='-o StrictHostKeyChecking=no'" \
              ${GITHUB_WORKSPACE}/actions/ansible/ci-node-checks.yml

      - name: Gather logs
        if: always()
        # Log collection is best effort and must never gate a merge: the
        # functional tests are the gate. A node that is unreachable at gather
        # time -- a deliberately-absent hypervisor (slim-primary's sf-absent)
        # or a real node that died mid-run -- is no fault of the code under
        # test. The playbook already skips unreachable nodes; this is
        # defense in depth so an unforeseen gather failure still can't fail
        # the run. Mirrors the node-lifecycle job in shakenfist.
        continue-on-error: true
        run: |
          . ${GITHUB_WORKSPACE}/ci-environment.sh

          mkdir -p /srv/github/artifacts
          mkdir -p /srv/github/bundle
          chmod ugo+rwx /srv/github /srv/github/artifacts /srv/github/bundle

          # Fetch unit test tracing. Sometimes this isn't present if we failed
          # super early in the CI job.
          scp -i /srv/github/id_ci -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null -rp \
              ${{ inputs.base_image_user }}@${primary}:/srv/ci/traces \
              /srv/github/bundle/ || true

          # We need the ssh key in the place ansible expects it to be, which isn't
          # true on the CI worker node.
          cp /srv/github/id_ci /home/debian/.ssh/id_rsa
          cp /srv/github/id_ci.pub /home/debian/.ssh/id_rsa.pub

          ansible-playbook -i /srv/github/ci-inventory.yaml \
              --extra-vars "base_image_user=${{ inputs.base_image_user }} \
              ansible_ssh_common_args='-o StrictHostKeyChecking=no'" \
              ${GITHUB_WORKSPACE}/actions/ansible/ci-gather-logs-loki.yml

      - name: Capture py-spy thread dumps
        if: always()
        continue-on-error: true
        run: |
          ansible-playbook -i /srv/github/ci-inventory.yaml \
              --extra-vars "ansible_ssh_common_args='-o StrictHostKeyChecking=no'" \
              ${GITHUB_WORKSPACE}/shakenfist/tools/ci_capture_pyspy.yml || true

      - name: Bundle artifacts
        if: always()
        run: |
          cd /srv/github
          sudo chown -R debian:debian /srv/github
          sudo find . -ls
          echo
          mkdir -p /srv/github/artifacts /srv/github/bundle
          zip -rq artifacts/bundle.zip bundle/* || true

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: bundle-${{ inputs.component }}-${{ inputs.tier }}${{ inputs.concurrency_key != '' && format('-{0}', inputs.concurrency_key) || '' }}
          retention-days: 90
          if-no-files-found: error
          path: /srv/github/artifacts/bundle.zip
