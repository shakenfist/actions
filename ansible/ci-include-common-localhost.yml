- name: Write details of instances to workspace
  copy:
    content: |
      {% for svr in groups.allsf %}
      export {{ svr | replace('-', '_') }}={{hostvars[svr]['ansible_ssh_host']}}
      export {{ svr | replace('-', '_') }}_uuid={{hostvars[svr]['sf_uuid']}}
      {% endfor %}

      export baseuser={{base_image_user}}
      export identifier={{identifier}}
      export nodes="{{ groups.allsf | join(' ') | replace('-', '_') }}"
    dest: "{{ lookup('env', 'GITHUB_WORKSPACE') }}/ci-environment.sh"
    owner: debian
    group: debian
    mode: u=r,g=r,o=r

- name: Write machine-readable topology facts to workspace
  copy:
    # A JSON description of every node the topology built via add_host, consumed
    # by tools/ci-make-inventory.py to generate the collection deploy inventory.
    # mesh_ip falls back to the egress IP for single-node topologies that set no
    # separate mesh interface. The capability flags use the
    # "groups['<grp>'] | default([])" form so a topology that omits a group
    # (e.g. no hypervisors) renders cleanly rather than erroring; "| lower"
    # turns Python True/False into JSON true/false.
    #
    # After the provisioned nodes we append absent_deploy_hypervisors: nodes a
    # topology lists in the deploy inventory but deliberately never creates a VM
    # for (slim-primary sets one -- see its comment). They land in the deploy
    # inventory as hypervisors, so the collection deploy must tolerate a node
    # that never answers; every other topology leaves the list empty (via
    # "default([])") and renders exactly as before. The trailing comma on the
    # last provisioned node is therefore conditional on whether any absent node
    # follows it.
    content: |
      {% set absent = absent_deploy_hypervisors | default([]) %}
      {
        "nodes": [
      {% for h in groups['allsf'] %}
          {
            "name": "{{ h }}",
            "egress_ip": "{{ hostvars[h]['ansible_ssh_host'] }}",
            "mesh_ip": "{{ hostvars[h]['mesh_ip'] | default(hostvars[h]['ansible_ssh_host']) }}",
            "is_hypervisor": {{ (h in (groups['hypervisors'] | default([]))) | lower }},
            "is_network_node": {{ (h in (groups['network_node'] | default([]))) | lower }},
            "is_database_node": {{ (h in ((groups['database_node'] | default([])) + (groups['etcd_master'] | default([])))) | lower }}
          }{{ "," if not loop.last or absent | length > 0 else "" }}
      {% endfor %}
      {% for a in absent %}
          {
            "name": "{{ a.name }}",
            "egress_ip": "{{ a.egress_ip }}",
            "mesh_ip": "{{ a.mesh_ip | default(a.egress_ip) }}",
            "is_hypervisor": true,
            "is_network_node": false,
            "is_database_node": false
          }{{ "," if not loop.last else "" }}
      {% endfor %}
        ]
      }
    dest: "/srv/github/ci-topology-facts.json"
    owner: debian
    group: debian
    mode: u=r,g=r,o=r

- name: Log environment details path
  debug:
    msg: "Environment details written to {{ lookup('env', 'GITHUB_WORKSPACE') }}/ci-environment.sh"

- name: Wait for all instances to present an "OpenSSH" prompt
  wait_for:
    port: 22
    host: "{{hostvars[item]['ansible_ssh_host']}}"
    search_regex: OpenSSH
    delay: 10
  with_items: "{{ groups['allsf'] }}"

- name: Upgrade wheel build tools
  shell: |
    python3 -mvenv /tmp/venv-build
    . /tmp/venv-build/bin/activate
    pip3 install uv build

- name: Build Shaken Fist wheel
  shell: |
    rm -f dist/*
    . /tmp/venv-build/bin/activate
    python3 -mbuild --wheel .
  args:
    chdir: "${GITHUB_WORKSPACE}/shakenfist"

- name: Determine wheel filename
  shell: ls dist | egrep "shakenfist.*\.whl"
  args:
    chdir: "${GITHUB_WORKSPACE}/shakenfist"
  register: server_wheel_file_complex

- name: Extract the wheel filename
  set_fact:
    server_wheel_file: "{{server_wheel_file_complex.stdout}}"

- debug:
    msg: "Server wheel file: {{server_wheel_file}}"

- name: Build Shaken Fist client wheel
  shell: |
    rm -f dist/*
