- hosts: localhost
  gather_facts: yes
  connection: ssh
  vars:
    identifier: unknown
    sshkey: '/srv/github/id_ci.pub'
    ssh_private_key: '/srv/github/id_ci'
    base_image: "https://sfcbr.shakenfist.com/static/ubuntu2004-ci-template.qcow2"
    base_image_user: "ubuntu"

  tasks:
    # Derive a short per-run suffix for under-cloud instance names so that
    # under-cloud logs (libvirt, qemu, syslog) can be grepped back to the
    # originating CI run. Leading "t-" avoids hostnames starting with a digit.
    - name: Compute under-cloud instance name suffix
      set_fact:
        instance_suffix: "{{ identifier[-5:] }}"

    - name: Create a primary instance
      sf_instance:
        name: "t-{{instance_suffix}}-primary"
        cpu: 12
        ram: 16384
        disks:
          - "100@{{base_image}}"
          - "60@sf://label/ci-images/dependencies"
        networkspecs:
          - network_uuid={{identifier}},address=10.0.0.10
        ssh_key: "{{ lookup('file', sshkey) }}"
        user_data: "{{ lookup('file', 'files/user-data') | b64encode }}"
        namespace: "{{identifier}}"
        state: present
        await: true
        await_timeout: 600
      register: primary

    - name: Add primary node to ansible
      add_host:
        hostname: primary
        egress_ip: "{{primary['meta']['interfaces'][0]['ipv4']}}"
        ansible_ssh_host: "{{primary['meta']['interfaces'][0]['ipv4']}}"
        ansible_ssh_extra_args: "-o StrictHostKeyChecking=no -o GlobalKnownHostsFile=/dev/null -o UserKnownHostsFile=/dev/null"
        ansible_ssh_user: "{{base_image_user}}"
        ansible_ssh_private_key_file: "{{ ssh_private_key }}"
        sf_uuid: "{{primary['meta']['uuid']}}"
        groups: allsf,etcd_master,primary_node,network_node,hypervisors

    - name: Log instance details
      debug:
        msg:
          - "Primary: is {{primary['meta']['uuid']}} at {{primary['meta']['interfaces'][0]['ipv4']}}"

    - include_tasks: ci-include-common-localhost.yml

- hosts: allsf
  gather_facts: yes
  become: true
  vars:
    sshkey: '/srv/github/id_ci.pub'
    ssh_private_key: '/srv/github/id_ci'

  tasks:
    - name: Configure apt to use HTTP cache proxy
      copy:
        content: |
          Acquire::http::Proxy "http://192.168.1.15:3128";
          Acquire::https::Proxy "http://192.168.1.15:3128";
        dest: /etc/apt/apt.conf.d/01proxy
        owner: root
        group: root
        mode: "0644"

    - name: Configure pip to use devpi mirror
      copy:
        content: |
          [global]
          index-url = https://devpi.home.stillhq.com/root/pypi/+simple/
        dest: /etc/pip.conf
        owner: root
        group: root
        mode: "0644"

    - name: Disable unattended upgrades
      when: ansible_distribution == "Ubuntu"
      service:
        name: unattended-upgrades
        state: stopped
        enabled: false

    # https://wiki.debian.org/UnattendedUpgrades#Modifying_download_and_upgrade_schedules_.28on_systemd.29
    - name: Disable daily apt downloads
      service:
        name: apt-daily
        state: stopped
        enabled: false

    - name: Disable daily apt upgrades
      service:
        name: apt-daily-upgrade
        state: stopped
        enabled: false

    - name: Make /srv/ci
      file:
        path: /srv/ci
        state: directory
        mode: u+rw,g+rw,o-rwx

    - name: Mount /srv/ci
      mount:
        path: /srv/ci
        src: /dev/vdc
        fstype: ext4
        state: mounted

    - name: Log the contents of /srv/ci
      shell: ls -lrth /srv/ci

    - name: Make /srv/shakenfist/volumes
      file:
        path: /srv/shakenfist/volumes
        state: directory
        mode: u+rw,g+rw,o-rwx

    - name: Disable logrotate
      service:
        name: logrotate
        enabled: no
        state: stopped

    - name: Disable logrotate.timer
      service:
        name: logrotate.timer
        enabled: no
        state: stopped

    - name: Copy server wheel file
      copy:
        src: "{{ lookup('ansible.builtin.env', 'GITHUB_WORKSPACE') }}/shakenfist/dist/{{hostvars['localhost']['server_wheel_file']}}"
        dest: "/root/{{hostvars['localhost']['server_wheel_file']}}"

    - name: Copy client wheel file
      copy:
        src: "{{ lookup('ansible.builtin.env', 'GITHUB_WORKSPACE') }}/client-python/dist/{{hostvars['localhost']['client_wheel_file']}}"
        dest: "/root/{{hostvars['localhost']['client_wheel_file']}}"

    - name: Copy agent wheel file
      copy:
        src: "{{ lookup('ansible.builtin.env', 'GITHUB_WORKSPACE') }}/agent-python/dist/{{hostvars['localhost']['agent_wheel_file']}}"
        dest: "/root/{{hostvars['localhost']['agent_wheel_file']}}"

    - name: Copy ssh key to primary node
      copy:
        src: "{{ ssh_private_key }}"
        dest: /root/.ssh/id_rsa
        owner: root
        group: root
        mode: u=r,g=,o=
