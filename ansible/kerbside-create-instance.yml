---
- name: Create an instance
  sf_instance:
    name: "{{ name }}"
    cpu: "{{ vcpus }}"
    ram: "{{ memory }}"
    disks:
      - "400@{{base}}"
    networkspecs:
      - network_uuid={{ environment_name }},address={{ address }},float=true
      - network_uuid={{ environment_name }},address=none
    ssh_key: "{{ lookup('file', sshkey) }}"
    namespace: "{{ identifier }}"
    side_channels:
      - sf-agent2
    metadata:
      affinity: "{ '{{ tag }}': -50 }"
      tags:
       - "{{ tag }}"
    user_data: ""
    state: present
    await: true
    await_timeout: 600
  register: new_instance

- name: Log environment instance
  debug:
    msg:
      - "New instance: {{ new_instance }}"

# Decide which IP to expose as ansible_ssh_host. Default behaviour
# (used by CI) is the internal address on the test network — the runner
# is itself a ShakenFist instance and routes onto that network. Callers
# outside the SF fabric (homelab overlays etc.) set prefer_floating_ip
# to true on the calling play to get the floating IP instead.
- name: Determine ssh host for the new instance
  set_fact:
    _new_instance_ssh_host: >-
      {{ new_instance['meta']['interfaces'][0]['floating']
         if (prefer_floating_ip | default(false) | bool
             and new_instance['meta']['interfaces'][0]['floating'] | default('', true))
         else new_instance['meta']['interfaces'][0]['ipv4'] }}

- name: Add node to ansible
  add_host:
    hostname: "{{ name }}"
    egress_ip: "{{ new_instance['meta']['interfaces'][0]['ipv4'] }}"
    egress_floating_ip: "{{ new_instance['meta']['interfaces'][0]['floating'] | default('', true) }}"
    ansible_ssh_host: "{{ _new_instance_ssh_host }}"
    ansible_ssh_extra_args: "-o StrictHostKeyChecking=no -o GlobalKnownHostsFile=/dev/null -o UserKnownHostsFile=/dev/null"
    ansible_ssh_user: "cloud-user"
    ansible_ssh_private_key_file: "{{ ssh_private_key }}"
    sf_uuid: "{{ new_instance['meta']['uuid'] }}"
    groups: allsf