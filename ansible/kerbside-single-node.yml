- hosts: localhost
  gather_facts: yes
  connection: ssh
  vars:
    base: rocky:9
    identifier: unknown
    sshkey: '/srv/github/id_ci.pub'
    ssh_private_key: '/srv/github/id_ci'
    environment_name: kolla
    hostname: kolla
    # True when this playbook is being driven from a ShakenFist CI
    # runner that is itself an instance named "{{ identifier }}" on
    # the SF fabric. The "Additional tasks for CI" block below relies
    # on that — it adds the test network as a second interface to the
    # runner instance and DHCPs on it. Non-CI callers (e.g. private
    # homelab overlays running from outside SF) should set this to
    # false so that block is skipped.
    running_in_ci: true
    # Whether instances added to the Ansible inventory should be
    # reached via their floating IP rather than the internal network
    # address. Required when the caller is outside the SF fabric and
    # therefore cannot route 10.0.2.0/24 directly. CI defaults to false
    # because the runner reaches the internal addresses after the CI
    # block above adds it to the test network.
    prefer_floating_ip: false

  tasks:
    # Idempotent: a no-op in CI (the runner already lives in this
    # namespace) but the off-fabric path needs it created.
    - name: Ensure the ShakenFist namespace exists
      sf_namespace:
        name: "{{ identifier }}"
        state: present

    - name: Create a network
      sf_network:
        netblock: "10.0.2.0/24"
        name: "{{environment_name}}"
        namespace: "{{identifier}}"
        state: present
        dns: true
      register: environment_network

    - name: Log environment network
      debug:
        msg:
          - "New network: {{ environment_network }}"

    - include_tasks: kerbside-create-instance.yml
      vars:
        instance_name: "{{ hostname }}"
        address: "10.0.2.2"
        vcpus: 12
        memory: 16384
        tag: "hypervisor"

    - name: Additional tasks for CI
      when: running_in_ci | bool
      tags: ci
      block:
      - name: Add environment network interface to primary instance
        shell: |
          sf-client instance add-interface -n "{{environment_name}}" "{{identifier}}"
          sleep 30

      - name: Determine the interface name for the new interface
        shell: |
          ip a | egrep "^[0-9]+: (ens|eth)" | grep -v eth0 | cut -f 2 -d " " | sed 's/:.*//'
        register: primary_new_interface
        retries: 6
        delay: 30
        until: primary_new_interface.stdout != ""

      - debug:
          msg:
            - "New interface on primary: {{ primary_new_interface.stdout }}"

      - name: DHCP on new interface
        become: true
        shell: "dhclient {{ primary_new_interface.stdout }}"

      - name: Collect address details for new interface
        shell: "ip -4 addr show {{ primary_new_interface.stdout }} | grep inet | sed -e 's/.*inet //' -e 's|/.*||'"
        register: primary_new_address

      - debug:
          msg:
            - "New interface address: {{ primary_new_address.stdout }}"

      - name: Write details of instances to workspace
        copy:
          content: |
            {% for svr in groups.allsf %}
            export {{ svr | replace('-', '_') }}={{hostvars[svr]['ansible_ssh_host']}}
            export {{ svr | replace('-', '_') }}_uuid={{hostvars[svr]['sf_uuid']}}
            {% endfor %}

            export identifier={{identifier}}
            export nodes="{{ groups.allsf | join(' ') | replace('-', '_') }}"
            export ENVIRONMENT="{{ primary_new_address.stdout }}"
          dest: "{{ lookup('env', 'GITHUB_WORKSPACE') }}/ci-environment.sh"
          owner: debian
          group: debian
          mode: u=r,g=r,o=r

      - name: Log environment details path
        debug:
          msg: "Environment details written to {{ lookup('env', 'GITHUB_WORKSPACE') }}/ci-environment.sh"

    # Cheap early gate: confirms sshd is listening and presenting a
    # banner. This is NOT sufficient on its own - sshd presents a banner
    # before cloud-init has finished, and cloud-init's host-key
    # regeneration restarts sshd afterwards, which drops the next real
    # SSH connection with "connection refused". The readiness play below
    # closes that window; this task just gives a fast failure if the
    # guest never boots at all.
    - name: Wait for all instances to present an "OpenSSH" prompt
      wait_for:
        port: 22
        host: "{{hostvars[item]['ansible_ssh_host']}}"
        search_regex: OpenSSH
        delay: 60
        timeout: 300
      with_items: "{{ groups['allsf'] }}"

# Readiness gate: the banner wait above only proves port 22 is open, not
# that the instance is fully provisioned. Wait for an authenticated SSH
# connection (which retries through sshd's cloud-init restart) and then
# block until cloud-init has actually finished, so subsequent SSH steps
# in the calling workflow do not race the host-key-regen restart. This
# play targets the "allsf" group so it inherits the per-instance
# ansible_ssh_host / ansible_ssh_user (cloud-user) / private key facts
# set by kerbside-create-instance.yml's add_host.
- name: Wait for instances to finish cloud-init
  hosts: allsf
  gather_facts: false
  tasks:
    - name: Wait for SSH to accept an authenticated connection
      ansible.builtin.wait_for_connection:
        delay: 0
        timeout: 300

    # `--wait` blocks until cloud-init reaches a terminal state, then
    # exits non-zero if that state is "error" or "degraded". This gate
    # exists to wait out the cloud-init window (so sshd has stopped
    # bouncing), not to assert cloud-init succeeded -- a genuinely broken
    # guest surfaces with a clearer error in the real SSH steps that
    # follow. So tolerate the exit code: we only care that --wait
    # returned, meaning cloud-init is done.
    - name: Wait for cloud-init to finish
      become: true
      ansible.builtin.command: cloud-init status --wait
      changed_when: false
      failed_when: false
